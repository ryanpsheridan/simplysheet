<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="donutClip">
      <circle cx="680" cy="260" r="100"/>
    </clipPath>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="200" cy="100" rx="280" ry="180" fill="#196EDD" fill-opacity="0.15" filter="url(#blur1)"/>
  <ellipse cx="750" cy="450" rx="240" ry="160" fill="#1565C0" fill-opacity="0.12" filter="url(#blur1)"/>
  <circle cx="900" cy="80" r="120" fill="#196EDD" fill-opacity="0.06" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.10"/>

  <!-- Main card - left side, showing budget breakdown -->
  <rect x="60" y="50" width="440" height="440" rx="16" fill="white" filter="url(#cardShadow)"/>

  <!-- Card header with pill -->
  <rect x="88" y="78" width="96" height="28" rx="14" fill="#EEF4FF"/>
  <text x="136" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#196EDD" text-anchor="middle">50 / 30 / 20</text>

  <text x="88" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8C8C8C">Monthly take-home</text>
  <text x="88" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#2A2522" letter-spacing="-0.5">$5,200</text>

  <line x1="88" y1="196" x2="472" y2="196" stroke="#F0F0F0" stroke-width="1"/>

  <!-- Needs row -->
  <text x="88" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#2A2522">Needs</text>
  <text x="472" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="end">$2,600</text>
  <rect x="88" y="240" width="384" height="6" rx="3" fill="#F0F0F0"/>
  <rect x="88" y="240" width="192" height="6" rx="3" fill="#196EDD"/>

  <!-- Wants row -->
  <text x="88" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#2A2522">Wants</text>
  <text x="472" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="end">$1,560</text>
  <rect x="88" y="288" width="384" height="6" rx="3" fill="#F0F0F0"/>
  <rect x="88" y="288" width="115" height="6" rx="3" fill="#64B5F6"/>

  <!-- Savings row -->
  <text x="88" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#2A2522">Savings &amp; Debt</text>
  <text x="472" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="end">$1,040</text>
  <rect x="88" y="336" width="384" height="6" rx="3" fill="#F0F0F0"/>
  <rect x="88" y="336" width="77" height="6" rx="3" fill="#1A237E"/>

  <!-- Status pill -->
  <rect x="88" y="370" width="140" height="32" rx="16" fill="#E8F5E9"/>
  <circle cx="108" cy="386" r="5" fill="#4CAF50"/>
  <text x="120" y="391" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#2E7D32">On track this month</text>

  <!-- Donut chart card - right side, overlapping -->
  <rect x="460" y="120" width="440" height="360" rx="16" fill="white" filter="url(#cardShadow)"/>

  <text x="500" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">Budget split</text>

  <!-- Donut chart -->
  <circle cx="680" cy="280" r="90" fill="none" stroke="#F0F0F0" stroke-width="28"/>
  <circle cx="680" cy="280" r="90" fill="none" stroke="#1A237E" stroke-width="28" stroke-dasharray="113 452" stroke-dashoffset="0" transform="rotate(-90 680 280)"/>
  <circle cx="680" cy="280" r="90" fill="none" stroke="#64B5F6" stroke-width="28" stroke-dasharray="170 395" stroke-dashoffset="-113" transform="rotate(-90 680 280)"/>
  <circle cx="680" cy="280" r="90" fill="none" stroke="#196EDD" stroke-width="28" stroke-dasharray="282 283" stroke-dashoffset="-283" transform="rotate(-90 680 280)"/>

  <!-- Center text -->
  <text x="680" y="274" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#2A2522" text-anchor="middle">100%</text>
  <text x="680" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8C8C8C" text-anchor="middle">allocated</text>

  <!-- Legend -->
  <circle cx="520" cy="420" r="5" fill="#196EDD"/>
  <text x="534" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6B6B">Needs 50%</text>
  <circle cx="630" cy="420" r="5" fill="#64B5F6"/>
  <text x="644" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6B6B">Wants 30%</text>
  <circle cx="740" cy="420" r="5" fill="#1A237E"/>
  <text x="754" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6B6B">Save 20%</text>
</svg>
