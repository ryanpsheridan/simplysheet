<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#196EDD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1259B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="300" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- Three proportional blocks — 50/30/20 — left-heavy, slight rotation -->
  <g transform="translate(160, 80)">
    <rect x="0" y="0" width="280" height="340" rx="6" fill="#196EDD" opacity="0.85" transform="rotate(-2 140 170)"/>
    <rect x="310" y="80" width="200" height="260" rx="6" fill="#2A2522" opacity="0.7" transform="rotate(1.5 410 210)"/>
    <rect x="540" y="150" width="140" height="190" rx="6" fill="#196EDD" opacity="0.3" transform="rotate(-3 610 245)"/>
  </g>

  <!-- Thin connecting line -->
  <line x1="160" y1="440" x2="820" y2="440" stroke="#2A2522" stroke-width="1" opacity="0.12"/>
</svg>
