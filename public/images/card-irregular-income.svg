<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9D78" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#43D9A2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#196EDD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#81C4FF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFE082" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <!-- Abstract gradient background -->
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="250" cy="150" rx="280" ry="200" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="100" rx="280" ry="200" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="60" rx="200" ry="160" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="150" cy="350" r="140" fill="#2D9D78" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="830" cy="80" r="120" fill="#196EDD" fill-opacity="0.08" filter="url(#blur3)"/>

  <!-- White card rising from bottom -->
  <rect x="240" y="120" width="480" height="440" rx="8" fill="white"/>

  <!-- Header -->
  <text x="276" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Monthly income</text>

  <!-- Bar chart -->
  <!-- Y-axis labels -->
  <text x="276" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C">$6k</text>
  <text x="276" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C">$4k</text>
  <text x="276" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C">$2k</text>
  <text x="276" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C">$0</text>

  <!-- Grid lines -->
  <line x1="306" y1="198" x2="660" y2="198" stroke="#F0EDEA" stroke-width="1"/>
  <line x1="306" y1="248" x2="660" y2="248" stroke="#F0EDEA" stroke-width="1"/>
  <line x1="306" y1="298" x2="660" y2="298" stroke="#F0EDEA" stroke-width="1"/>
  <line x1="306" y1="348" x2="660" y2="348" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Bars (varying heights for irregular income) -->
  <rect x="320" y="218" width="36" height="130" rx="3" fill="#2D9D78" fill-opacity="0.2"/>
  <rect x="370" y="238" width="36" height="110" rx="3" fill="#2D9D78" fill-opacity="0.2"/>
  <rect x="420" y="198" width="36" height="150" rx="3" fill="#2D9D78" fill-opacity="0.2"/>
  <rect x="470" y="268" width="36" height="80" rx="3" fill="#2D9D78" fill-opacity="0.2"/>
  <rect x="520" y="208" width="36" height="140" rx="3" fill="#2D9D78"/>
  <rect x="570" y="248" width="36" height="100" rx="3" fill="#2D9D78" fill-opacity="0.2"/>
  <rect x="620" y="228" width="36" height="120" rx="3" fill="#2D9D78" fill-opacity="0.2"/>

  <!-- Month labels -->
  <text x="328" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C" text-anchor="middle">Jan</text>
  <text x="378" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C" text-anchor="middle">Feb</text>
  <text x="428" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C" text-anchor="middle">Mar</text>
  <text x="478" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C" text-anchor="middle">Apr</text>
  <text x="528" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2A2522" text-anchor="middle">May</text>
  <text x="578" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C" text-anchor="middle">Jun</text>
  <text x="628" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8A817C" text-anchor="middle">Jul</text>

  <!-- Baseline indicator -->
  <line x1="306" y1="258" x2="660" y2="258" stroke="#2D9D78" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="660" y="254" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2D9D78" text-anchor="end">Baseline</text>

  <!-- Summary row -->
  <line x1="276" y1="388" x2="684" y2="388" stroke="#F0EDEA" stroke-width="1"/>
  <text x="276" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6E6560">Average</text>
  <text x="276" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#2A2522">$4,280</text>
  <text x="420" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6E6560">This month</text>
  <text x="420" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#2D9D78">$5,100</text>
</svg>
