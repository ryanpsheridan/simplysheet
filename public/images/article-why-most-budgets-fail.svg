<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9A825" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8F00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFCA28" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="700" cy="200" rx="300" ry="250" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="250" cy="380" rx="280" ry="200" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="100" rx="250" ry="200" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="800" cy="420" r="140" fill="#F9A825" fill-opacity="0.08" filter="url(#blur2)"/>
  <circle cx="120" cy="150" r="100" fill="#7E57C2" fill-opacity="0.1" filter="url(#blur3)"/>
  <rect x="200" y="200" width="180" height="180" rx="36" fill="white" fill-opacity="0.14" transform="rotate(-12, 290, 290)" filter="url(#blur2)"/>
  <rect x="580" y="280" width="150" height="150" rx="32" fill="white" fill-opacity="0.1" transform="rotate(20, 655, 355)" filter="url(#blur2)"/>
  <circle cx="680" cy="160" r="50" fill="white" fill-opacity="0.12" filter="url(#blur2)"/>
  <circle cx="400" cy="400" r="70" fill="white" fill-opacity="0.08" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>
</svg>
