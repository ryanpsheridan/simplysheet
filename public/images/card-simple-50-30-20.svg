<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#196EDD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1259B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="300" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="30" rx="220" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="250" r="120" fill="#196EDD" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="130" fill="#7E57C2" fill-opacity="0.08" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Layout: three category blocks side by side -->
  <text x="480" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="middle">50 / 30 / 20</text>
  <rect x="420" y="128" width="120" height="8" rx="4" fill="#EBEBEB"/>

  <line x1="164" y1="158" x2="796" y2="158" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Needs — left column -->
  <text x="164" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Needs</text>
  <text x="164" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#196EDD">50%</text>
  <rect x="164" y="258" width="180" height="8" rx="4" fill="#F0EDEA"/>
  <rect x="164" y="258" width="180" height="8" rx="4" fill="#196EDD"/>
  <rect x="164" y="280" width="120" height="8" rx="4" fill="#EBEBEB"/>

  <!-- Wants — center column -->
  <text x="392" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Wants</text>
  <text x="392" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#196EDD" fill-opacity="0.55">30%</text>
  <rect x="392" y="258" width="180" height="8" rx="4" fill="#F0EDEA"/>
  <rect x="392" y="258" width="108" height="8" rx="4" fill="#196EDD" fill-opacity="0.5"/>
  <rect x="392" y="280" width="100" height="8" rx="4" fill="#EBEBEB"/>

  <!-- Savings — right column -->
  <text x="620" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Savings</text>
  <text x="620" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#196EDD" fill-opacity="0.3">20%</text>
  <rect x="620" y="258" width="176" height="8" rx="4" fill="#F0EDEA"/>
  <rect x="620" y="258" width="70" height="8" rx="4" fill="#196EDD" fill-opacity="0.25"/>
  <rect x="620" y="280" width="88" height="8" rx="4" fill="#EBEBEB"/>

  <!-- Full-width stacked bar at bottom -->
  <line x1="164" y1="320" x2="796" y2="320" stroke="#F0EDEA" stroke-width="1"/>
  <rect x="164" y="350" width="632" height="20" rx="10" fill="#F0EDEA"/>
  <rect x="164" y="350" width="316" height="20" rx="10" fill="#196EDD"/>
  <rect x="480" y="350" width="190" height="20" rx="0" fill="#196EDD" fill-opacity="0.5"/>
  <rect x="670" y="350" width="126" height="20" rx="0 10 10 0" fill="#196EDD" fill-opacity="0.25"/>
  <!-- Round the right end -->
  <rect x="670" y="350" width="126" height="20" rx="10" fill="#196EDD" fill-opacity="0.25"/>

  <rect x="164" y="392" width="80" height="8" rx="4" fill="#EBEBEB"/>
  <rect x="440" y="392" width="60" height="8" rx="4" fill="#EBEBEB"/>
  <rect x="720" y="392" width="76" height="8" rx="4" fill="#EBEBEB"/>
</svg>
