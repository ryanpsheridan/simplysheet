<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#196EDD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1259B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="120" y="68" width="720" height="490" rx="10"/>
    </clipPath>
    <!-- Landscape blur -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D6EAFF"/>
      <stop offset="100%" stop-color="#A8D4FF"/>
    </linearGradient>
    <filter id="land-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="300" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="30" rx="220" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="250" r="120" fill="#196EDD" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="130" fill="#7E57C2" fill-opacity="0.08" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <g clip-path="url(#card-clip)">
    <!-- Rolling hills landscape — soft layered hills receding into distance -->
    <rect x="120" y="68" width="720" height="490" fill="url(#sky)"/>

    <!-- Distant hills — very faded -->
    <ellipse cx="350" cy="340" rx="400" ry="120" fill="#196EDD" opacity="0.15" filter="url(#land-blur)"/>
    <ellipse cx="700" cy="360" rx="350" ry="100" fill="#1259B8" opacity="0.12" filter="url(#land-blur)"/>

    <!-- Mid-ground hills -->
    <ellipse cx="250" cy="400" rx="380" ry="130" fill="#196EDD" opacity="0.25" filter="url(#land-blur)"/>
    <ellipse cx="650" cy="420" rx="400" ry="120" fill="#3B7DE8" opacity="0.2" filter="url(#land-blur)"/>

    <!-- Foreground hills — richer color -->
    <ellipse cx="480" cy="520" rx="500" ry="160" fill="#196EDD" opacity="0.4" filter="url(#land-blur)"/>
    <ellipse cx="200" cy="540" rx="350" ry="140" fill="#1259B8" opacity="0.35" filter="url(#land-blur)"/>
    <ellipse cx="750" cy="550" rx="300" ry="130" fill="#196EDD" opacity="0.3" filter="url(#land-blur)"/>
  </g>
</svg>
