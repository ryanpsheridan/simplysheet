<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#196EDD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1259B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="300" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="30" rx="220" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="250" r="120" fill="#196EDD" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="130" fill="#7E57C2" fill-opacity="0.08" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Header -->
  <text x="164" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#2A2522">50 / 30 / 20 budget</text>
  <text x="164" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8A817C">Monthly take-home: $5,200</text>

  <line x1="164" y1="184" x2="796" y2="184" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Needs -->
  <text x="164" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6E6560">Needs</text>
  <text x="796" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#2A2522" text-anchor="end">$2,600</text>
  <rect x="164" y="248" width="632" height="8" rx="4" fill="#F0EDEA"/>
  <rect x="164" y="248" width="632" height="8" rx="4" fill="#196EDD"/>

  <!-- Wants -->
  <text x="164" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6E6560">Wants</text>
  <text x="796" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#2A2522" text-anchor="end">$1,560</text>
  <rect x="164" y="328" width="632" height="8" rx="4" fill="#F0EDEA"/>
  <rect x="164" y="328" width="380" height="8" rx="4" fill="#196EDD" fill-opacity="0.5"/>

  <!-- Savings & Debt -->
  <text x="164" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6E6560">Savings &amp; Debt</text>
  <text x="796" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#2A2522" text-anchor="end">$1,040</text>
  <rect x="164" y="408" width="632" height="8" rx="4" fill="#F0EDEA"/>
  <rect x="164" y="408" width="253" height="8" rx="4" fill="#196EDD" fill-opacity="0.25"/>
</svg>
