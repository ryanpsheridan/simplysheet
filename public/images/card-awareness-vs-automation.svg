<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00897B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4DB6AC" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00695C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9FA8DA" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Abstract gradient background -->
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="240" cy="120" rx="280" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="730" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="490" cy="30" rx="200" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="140" cy="310" r="130" fill="#00897B" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="110" fill="#5C6BC0" fill-opacity="0.08" filter="url(#blur3)"/>

  <!-- Grain texture overlay -->
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Header -->
  <text x="164" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">Daily expense log</text>

  <!-- Column headers -->
  <text x="164" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8A817C">DATE</text>
  <text x="300" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8A817C">DESCRIPTION</text>
  <text x="580" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8A817C">CATEGORY</text>
  <text x="740" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8A817C" text-anchor="end">AMOUNT</text>

  <!-- Divider -->
  <line x1="164" y1="158" x2="796" y2="158" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="164" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Jun 25</text>
  <text x="300" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Morning coffee</text>
  <rect x="580" y="172" width="68" height="20" rx="10" fill="#E0F2F1"/>
  <text x="614" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#00897B" text-anchor="middle">Food</text>
  <text x="740" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$5.40</text>

  <!-- Row 2 -->
  <text x="164" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Jun 25</text>
  <text x="300" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Gas station</text>
  <rect x="580" y="206" width="90" height="20" rx="10" fill="#E8EAF6"/>
  <text x="625" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5C6BC0" text-anchor="middle">Transport</text>
  <text x="740" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$42.00</text>

  <!-- Row 3 — highlighted -->
  <rect x="150" y="230" width="660" height="30" rx="4" fill="#E0F2F1" fill-opacity="0.5"/>
  <text x="164" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Jun 24</text>
  <text x="300" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Streaming service</text>
  <rect x="580" y="238" width="60" height="20" rx="10" fill="#FFF3E0"/>
  <text x="610" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E86A33" text-anchor="middle">Subs</text>
  <text x="740" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$15.99</text>

  <!-- Row 4 -->
  <text x="164" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Jun 24</text>
  <text x="300" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Grocery run</text>
  <rect x="580" y="272" width="68" height="20" rx="10" fill="#E0F2F1"/>
  <text x="614" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#00897B" text-anchor="middle">Food</text>
  <text x="740" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$67.23</text>

  <!-- Row 5 -->
  <text x="164" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Jun 23</text>
  <text x="300" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Lunch with friend</text>
  <rect x="580" y="306" width="68" height="20" rx="10" fill="#E0F2F1"/>
  <text x="614" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#00897B" text-anchor="middle">Food</text>
  <text x="740" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$24.50</text>

  <!-- Row 6 -->
  <text x="164" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Jun 23</text>
  <text x="300" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Online order</text>
  <rect x="580" y="340" width="82" height="20" rx="10" fill="#F3E5F5"/>
  <text x="621" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7E57C2" text-anchor="middle">Shopping</text>
  <text x="740" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560" text-anchor="end">$33.00</text>

  <!-- Summary row -->
  <line x1="164" y1="378" x2="796" y2="378" stroke="#F0EDEA" stroke-width="1"/>
  <text x="164" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">This week</text>
  <text x="164" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2A2522">$188.12</text>
  <text x="420" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Entries</text>
  <text x="420" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#00897B">6</text>
</svg>
