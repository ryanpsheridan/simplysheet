<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11D48" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FB7185" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BE123C" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FDA4AF" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FECACA" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="680" cy="180" rx="320" ry="260" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="220" cy="400" rx="290" ry="210" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="80" rx="260" ry="180" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="840" cy="440" r="150" fill="#E11D48" fill-opacity="0.08" filter="url(#blur2)"/>
  <circle cx="110" cy="130" r="110" fill="#F43F5E" fill-opacity="0.1" filter="url(#blur3)"/>
  <rect x="160" y="220" width="180" height="180" rx="36" fill="white" fill-opacity="0.12" transform="rotate(-15, 250, 310)" filter="url(#blur2)"/>
  <rect x="610" y="300" width="150" height="150" rx="30" fill="white" fill-opacity="0.1" transform="rotate(18, 685, 375)" filter="url(#blur2)"/>
  <circle cx="720" cy="140" r="55" fill="white" fill-opacity="0.12" filter="url(#blur2)"/>
  <circle cx="380" cy="430" r="70" fill="white" fill-opacity="0.08" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>
</svg>
