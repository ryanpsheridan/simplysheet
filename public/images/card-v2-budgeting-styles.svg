<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#B39DDB" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4527A0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D1C4E9" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="500" cy="150" rx="320" ry="200" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="200" cy="420" rx="260" ry="180" fill="url(#blob2)" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- Grid of varied shapes — different styles side by side — diagonal composition -->
  <rect x="120" y="100" width="180" height="180" rx="90" fill="#7E57C2" opacity="0.4" transform="rotate(3 210 190)"/>
  <rect x="360" y="160" width="160" height="160" rx="6" fill="#7E57C2" opacity="0.2" transform="rotate(-2 440 240)"/>
  <polygon points="640,140 720,300 560,300" fill="#7E57C2" opacity="0.15" transform="rotate(4 640 220)"/>

  <!-- Thin grid lines suggesting structure -->
  <line x1="340" y1="100" x2="340" y2="340" stroke="#7E57C2" stroke-width="1" opacity="0.1"/>
  <line x1="540" y1="120" x2="540" y2="340" stroke="#7E57C2" stroke-width="1" opacity="0.08"/>

  <!-- Bottom accent bar extending off canvas -->
  <rect x="200" y="420" width="700" height="8" rx="4" fill="#7E57C2" opacity="0.12"/>

  <!-- Small dot -->
  <circle cx="800" cy="180" r="5" fill="#4527A0" opacity="0.2"/>
</svg>
