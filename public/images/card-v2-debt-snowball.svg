<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8EDF2"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="160" cy="120" rx="260" ry="180" fill="#2C3E50" fill-opacity="0.10" filter="url(#blur1)"/>
  <ellipse cx="800" cy="420" rx="280" ry="180" fill="#546E7A" fill-opacity="0.10" filter="url(#blur1)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.10"/>

  <!-- Left card - Snowball method -->
  <rect x="60" y="50" width="410" height="440" rx="16" fill="white" filter="url(#shadow)"/>

  <rect x="88" y="78" width="80" height="28" rx="14" fill="#E8EDF2"/>
  <text x="128" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#2C3E50" text-anchor="middle">Snowball</text>

  <text x="88" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8C8C8C">Pay off smallest balance first</text>

  <!-- Debt 1 - smallest, almost done -->
  <rect x="88" y="156" width="354" height="72" rx="10" fill="#F8F9FA"/>
  <text x="104" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Credit Card</text>
  <text x="426" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="end">$340</text>
  <rect x="104" y="192" width="322" height="5" rx="2.5" fill="#E0E0E0"/>
  <rect x="104" y="192" width="290" height="5" rx="2.5" fill="#4CAF50"/>
  <text x="104" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C">90% paid · 2 mo left</text>

  <!-- Debt 2 -->
  <rect x="88" y="240" width="354" height="72" rx="10" fill="#F8F9FA"/>
  <text x="104" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Medical Bill</text>
  <text x="426" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="end">$2,100</text>
  <rect x="104" y="276" width="322" height="5" rx="2.5" fill="#E0E0E0"/>
  <rect x="104" y="276" width="130" height="5" rx="2.5" fill="#2C3E50"/>
  <text x="104" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C">40% paid · 8 mo left</text>

  <!-- Debt 3 -->
  <rect x="88" y="324" width="354" height="72" rx="10" fill="#F8F9FA"/>
  <text x="104" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Car Loan</text>
  <text x="426" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="end">$8,400</text>
  <rect x="104" y="360" width="322" height="5" rx="2.5" fill="#E0E0E0"/>
  <rect x="104" y="360" width="48" height="5" rx="2.5" fill="#90A4AE"/>
  <text x="104" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C">15% paid · queued</text>

  <!-- Total -->
  <text x="88" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8C8C8C">Total remaining</text>
  <text x="442" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#2A2522" text-anchor="end">$10,840</text>

  <!-- Right card - Avalanche method -->
  <rect x="500" y="80" width="400" height="420" rx="16" fill="white" filter="url(#shadow)"/>

  <rect x="528" y="108" width="84" height="28" rx="14" fill="#E8EDF2"/>
  <text x="570" y="127" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#2C3E50" text-anchor="middle">Avalanche</text>

  <text x="528" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8C8C8C">Pay off highest rate first</text>

  <!-- Debt 1 - highest rate -->
  <rect x="528" y="186" width="344" height="72" rx="10" fill="#F8F9FA"/>
  <text x="544" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Credit Card</text>
  <rect x="664" y="198" width="54" height="20" rx="10" fill="#FFEBEE"/>
  <text x="691" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#C62828" text-anchor="middle">22.9%</text>
  <text x="856" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="end">$340</text>
  <rect x="544" y="224" width="312" height="5" rx="2.5" fill="#E0E0E0"/>
  <rect x="544" y="224" width="280" height="5" rx="2.5" fill="#C62828"/>
  <text x="544" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C">Paying first · saves $890 interest</text>

  <!-- Debt 2 -->
  <rect x="528" y="268" width="344" height="72" rx="10" fill="#F8F9FA"/>
  <text x="544" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Car Loan</text>
  <rect x="632" y="280" width="46" height="20" rx="10" fill="#FFF3E0"/>
  <text x="655" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#E65100" text-anchor="middle">6.5%</text>
  <text x="856" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="end">$8,400</text>
  <rect x="544" y="306" width="312" height="5" rx="2.5" fill="#E0E0E0"/>
  <rect x="544" y="306" width="47" height="5" rx="2.5" fill="#E65100"/>
  <text x="544" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C">Queued next</text>

  <!-- Debt 3 -->
  <rect x="528" y="352" width="344" height="72" rx="10" fill="#F8F9FA"/>
  <text x="544" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Medical Bill</text>
  <rect x="648" y="364" width="38" height="20" rx="10" fill="#E8F5E9"/>
  <text x="667" y="379" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2E7D32" text-anchor="middle">0%</text>
  <text x="856" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="end">$2,100</text>
  <rect x="544" y="390" width="312" height="5" rx="2.5" fill="#E0E0E0"/>
  <rect x="544" y="390" width="125" height="5" rx="2.5" fill="#2E7D32"/>
  <text x="544" y="412" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C">Interest-free · last priority</text>

  <!-- Comparison badge floating -->
  <rect x="420" y="460" width="200" height="40" rx="20" fill="#2C3E50" filter="url(#shadow)"/>
  <text x="520" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Avalanche saves $890</text>
</svg>
