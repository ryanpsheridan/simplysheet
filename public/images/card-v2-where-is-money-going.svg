<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E86A33" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFB74D" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BF360C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFCC80" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="700" cy="400" rx="300" ry="220" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="250" cy="120" rx="280" ry="180" fill="url(#blob2)" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- Intersecting rectangles with thin connecting lines — categories/flows -->
  <g transform="translate(0, 0)">
    <!-- Large cropped rectangle extending off left edge -->
    <rect x="-40" y="140" width="340" height="240" rx="8" fill="#E86A33" opacity="0.12" transform="rotate(-3 130 260)"/>

    <!-- Central rectangle -->
    <rect x="360" y="180" width="220" height="200" rx="6" fill="#E86A33" opacity="0.5" transform="rotate(2 470 280)"/>

    <!-- Right rectangle -->
    <rect x="640" y="120" width="180" height="160" rx="6" fill="#2A2522" opacity="0.08" transform="rotate(-2 730 200)"/>

    <!-- Thin connecting lines -->
    <line x1="300" y1="270" x2="360" y2="270" stroke="#E86A33" stroke-width="1" opacity="0.3"/>
    <line x1="580" y1="250" x2="640" y2="200" stroke="#2A2522" stroke-width="1" opacity="0.15"/>

    <!-- Small floating square -->
    <rect x="700" y="380" width="60" height="60" rx="4" fill="#E86A33" opacity="0.2" transform="rotate(5 730 410)"/>
  </g>
</svg>
