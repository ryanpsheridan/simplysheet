<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9D78" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#66BB6A" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A5D6A7" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="300" cy="400" rx="320" ry="240" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="750" cy="150" rx="260" ry="180" fill="url(#blob2)" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- Uneven vertical bars — irregular rhythm — bottom-weighted -->
  <rect x="140" y="280" width="56" height="220" rx="4" fill="#2D9D78" opacity="0.6" transform="rotate(-1 168 390)"/>
  <rect x="230" y="180" width="56" height="320" rx="4" fill="#2D9D78" opacity="0.35" transform="rotate(1.5 258 340)"/>
  <rect x="320" y="320" width="56" height="180" rx="4" fill="#2A2522" opacity="0.08"/>
  <rect x="410" y="140" width="56" height="360" rx="4" fill="#2D9D78" opacity="0.5" transform="rotate(-2 438 320)"/>
  <rect x="500" y="260" width="56" height="240" rx="4" fill="#2D9D78" opacity="0.25"/>
  <rect x="590" y="340" width="56" height="160" rx="4" fill="#2D9D78" opacity="0.15" transform="rotate(2 618 420)"/>
  <rect x="680" y="200" width="56" height="300" rx="4" fill="#2D9D78" opacity="0.4" transform="rotate(-1 708 350)"/>
  <rect x="770" y="300" width="56" height="200" rx="4" fill="#2A2522" opacity="0.06" transform="rotate(1 798 400)"/>
</svg>
