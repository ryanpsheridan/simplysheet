<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9A825" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F57F17" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFE082" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F9A825" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="120" y="68" width="720" height="490" rx="10"/>
    </clipPath>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="40%" stop-color="#FFEFCC"/>
      <stop offset="100%" stop-color="#FFE5A8"/>
    </linearGradient>
    <filter id="land-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="240" cy="160" rx="300" ry="220" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="400" rx="280" ry="200" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="40" rx="240" ry="160" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="130" cy="380" r="130" fill="#F9A825" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="860" cy="90" r="110" fill="#F57F17" fill-opacity="0.07" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <g clip-path="url(#card-clip)">
    <!-- Golden hour meadow — warm hazy field with tree line silhouette -->
    <rect x="120" y="68" width="720" height="490" fill="url(#sky)"/>

    <!-- Low sun glow -->
    <circle cx="350" cy="260" r="100" fill="#FFD54F" opacity="0.25" filter="url(#land-blur)"/>
    <circle cx="350" cy="260" r="50" fill="#FFF8E1" opacity="0.3" filter="url(#land-blur)"/>

    <!-- Distant tree line — irregular bumpy silhouette -->
    <ellipse cx="200" cy="330" rx="80" ry="40" fill="#F9A825" opacity="0.12" filter="url(#land-blur)"/>
    <ellipse cx="320" cy="325" rx="70" ry="50" fill="#F57F17" opacity="0.1" filter="url(#land-blur)"/>
    <ellipse cx="450" cy="335" rx="90" ry="35" fill="#F9A825" opacity="0.12" filter="url(#land-blur)"/>
    <ellipse cx="580" cy="320" rx="60" ry="45" fill="#F57F17" opacity="0.1" filter="url(#land-blur)"/>
    <ellipse cx="700" cy="330" rx="100" ry="40" fill="#F9A825" opacity="0.11" filter="url(#land-blur)"/>

    <!-- Meadow field -->
    <rect x="120" y="340" width="720" height="220" fill="#F9A825" opacity="0.12" filter="url(#land-blur)"/>
    <ellipse cx="300" cy="420" rx="400" ry="80" fill="#F9A825" opacity="0.15" filter="url(#land-blur)"/>
    <ellipse cx="600" cy="480" rx="350" ry="90" fill="#F57F17" opacity="0.12" filter="url(#land-blur)"/>

    <!-- Foreground warmth -->
    <ellipse cx="480" cy="550" rx="500" ry="80" fill="#F9A825" opacity="0.2" filter="url(#land-blur)"/>
  </g>
</svg>
