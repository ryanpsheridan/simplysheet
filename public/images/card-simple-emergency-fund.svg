<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7986CB" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3949AB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9FA8DA" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26A69A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="280" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="680" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="30" rx="220" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="300" r="130" fill="#5C6BC0" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="120" fill="#26A69A" fill-opacity="0.08" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Layout: large circular progress as hero, details beside it -->

  <!-- Circular progress ring — large and centered-left -->
  <circle cx="320" cy="300" r="100" fill="none" stroke="#F0EDEA" stroke-width="16"/>
  <circle cx="320" cy="300" r="100" fill="none" stroke="#5C6BC0" stroke-width="16" stroke-dasharray="352 276" stroke-linecap="round" transform="rotate(-90 320 300)"/>
  <text x="320" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2A2522" text-anchor="middle">56%</text>
  <text x="320" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8A817C" text-anchor="middle">funded</text>

  <!-- Right side — stacked info -->
  <text x="480" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6E6560">Emergency fund goal</text>
  <text x="480" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2A2522">$16,800</text>
  <text x="480" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8A817C">$2,800/mo × 6 months</text>

  <line x1="480" y1="260" x2="796" y2="260" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Expense list — right side -->
  <text x="480" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Housing</text>
  <rect x="720" y="284" width="76" height="14" rx="7" fill="#EBEBEB"/>

  <text x="480" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Groceries</text>
  <rect x="720" y="320" width="76" height="14" rx="7" fill="#EBEBEB"/>

  <text x="480" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Insurance</text>
  <rect x="720" y="356" width="76" height="14" rx="7" fill="#EBEBEB"/>

  <text x="480" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6E6560">+ 2 more</text>
  <rect x="720" y="392" width="76" height="14" rx="7" fill="#EBEBEB"/>
</svg>
