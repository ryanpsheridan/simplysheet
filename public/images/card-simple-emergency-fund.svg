<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7986CB" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3949AB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9FA8DA" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26A69A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="120" y="68" width="720" height="490" rx="10"/>
    </clipPath>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0E3F5"/>
      <stop offset="100%" stop-color="#C8CCE8"/>
    </linearGradient>
    <filter id="land-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="280" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="680" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="30" rx="220" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="300" r="130" fill="#5C6BC0" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="120" fill="#26A69A" fill-opacity="0.08" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <g clip-path="url(#card-clip)">
    <!-- Mountain peaks landscape — sharp ridges softened by blur -->
    <rect x="120" y="68" width="720" height="490" fill="url(#sky)"/>

    <!-- Distant mountain range -->
    <polygon points="120,380 220,240 320,300 400,200 500,280 580,220 680,310 780,250 840,340 840,558 120,558" fill="#5C6BC0" opacity="0.12" filter="url(#land-blur)"/>

    <!-- Mid mountains -->
    <polygon points="120,420 200,300 300,360 380,270 460,340 560,260 640,330 740,290 840,380 840,558 120,558" fill="#3949AB" opacity="0.2" filter="url(#land-blur)"/>

    <!-- Foreground mountains -->
    <polygon points="120,460 240,340 340,400 440,320 540,390 620,350 720,410 840,360 840,558 120,558" fill="#5C6BC0" opacity="0.35" filter="url(#land-blur)"/>

    <!-- Near foreground -->
    <ellipse cx="480" cy="540" rx="500" ry="120" fill="#3949AB" opacity="0.3" filter="url(#land-blur)"/>
  </g>
</svg>
