<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#B39DDB" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4527A0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D1C4E9" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="650" cy="200" rx="300" ry="220" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="300" cy="400" rx="260" ry="180" fill="url(#blob2)" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- Two parallel forms merging — partnership — right-heavy composition -->
  <rect x="300" y="120" width="200" height="320" rx="100" fill="#7E57C2" opacity="0.3" transform="rotate(-4 400 280)"/>
  <rect x="460" y="120" width="200" height="320" rx="100" fill="#7E57C2" opacity="0.2" transform="rotate(4 560 280)"/>

  <!-- Overlap region -->
  <ellipse cx="480" cy="280" rx="40" ry="120" fill="#7E57C2" opacity="0.15"/>

  <!-- Connecting arc above -->
  <path d="M 340 140 Q 480 60 620 140" fill="none" stroke="#7E57C2" stroke-width="1.5" opacity="0.15"/>

  <!-- Small accent -->
  <circle cx="780" cy="400" r="40" fill="none" stroke="#4527A0" stroke-width="1" opacity="0.12"/>
  <circle cx="140" cy="160" r="3" fill="#7E57C2" opacity="0.35"/>
</svg>
