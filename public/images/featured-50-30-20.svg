<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#196EDD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1259B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <!-- Abstract gradient background -->
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="300" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="30" rx="220" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="250" r="120" fill="#196EDD" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="130" fill="#7E57C2" fill-opacity="0.08" filter="url(#blur3)"/>

  <!-- White card rising from bottom — 75% of container -->
  <rect x="120" y="135" width="720" height="420" rx="10" fill="white"/>

  <!-- Label: Monthly take-home income -->
  <text x="164" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">Monthly take-home income</text>

  <!-- Input field -->
  <rect x="164" y="200" width="632" height="48" rx="6" fill="none" stroke="#E3DFDB" stroke-width="1.5"/>
  <text x="184" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8A817C">$</text>
  <text x="200" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#2A2522">5,360</text>

  <!-- Needs row -->
  <text x="164" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Needs</text>
  <text x="164" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2A2522">$2,680</text>
  <rect x="164" y="332" width="632" height="6" rx="3" fill="#E8F0FE"/>
  <rect x="164" y="332" width="632" height="6" rx="3" fill="#196EDD"/>

  <!-- Wants row -->
  <text x="164" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Wants</text>
  <text x="164" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2A2522">$1,608</text>
  <rect x="164" y="412" width="632" height="6" rx="3" fill="#E8F0FE"/>
  <rect x="164" y="412" width="380" height="6" rx="3" fill="#6E6560"/>

  <!-- Savings & Debt row -->
  <text x="164" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Savings &amp; Debt</text>
  <text x="164" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2A2522">$1,072</text>
  <rect x="164" y="492" width="632" height="6" rx="3" fill="#E8F0FE"/>
  <rect x="164" y="492" width="253" height="6" rx="3" fill="#2A2522"/>
</svg>
