<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E86A33" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF9A5C" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D84315" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF8A65" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <style>
    .exp-bar { animation: exp-pulse 4s ease-in-out infinite; }
    .exp-1 { animation-delay: 0s; }
    .exp-2 { animation-delay: 0.3s; }
    .exp-3 { animation-delay: 0.6s; }
    .exp-4 { animation-delay: 0.9s; }
    .exp-5 { animation-delay: 1.2s; }
    @keyframes exp-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @media (prefers-reduced-motion: reduce) {
      .exp-bar { animation: none; }
    }
  </style>

  <!-- Abstract gradient background -->
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="280" cy="120" rx="300" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="680" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="30" rx="220" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="300" r="130" fill="#E86A33" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="120" fill="#7E57C2" fill-opacity="0.08" filter="url(#blur3)"/>

  <!-- Grain texture overlay -->
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Header -->
  <text x="164" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">June spending</text>
  <text x="164" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#2A2522">$3,847</text>

  <!-- Divider -->
  <line x1="164" y1="162" x2="796" y2="162" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Housing -->
  <text x="164" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Housing</text>
  <text x="796" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522" text-anchor="end">$1,450</text>
  <rect x="164" y="208" width="632" height="5" rx="2.5" fill="#F0EDEA"/>
  <rect class="exp-bar exp-1" x="164" y="208" width="476" height="5" rx="2.5" fill="#E86A33"/>

  <!-- Food -->
  <text x="164" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Food &amp; Dining</text>
  <text x="796" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522" text-anchor="end">$620</text>
  <rect x="164" y="260" width="632" height="5" rx="2.5" fill="#F0EDEA"/>
  <rect class="exp-bar exp-2" x="164" y="260" width="204" height="5" rx="2.5" fill="#E86A33" fill-opacity="0.7"/>

  <!-- Transportation -->
  <text x="164" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Transportation</text>
  <text x="796" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522" text-anchor="end">$485</text>
  <rect x="164" y="312" width="632" height="5" rx="2.5" fill="#F0EDEA"/>
  <rect class="exp-bar exp-3" x="164" y="312" width="160" height="5" rx="2.5" fill="#E86A33" fill-opacity="0.5"/>

  <!-- Subscriptions -->
  <text x="164" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Subscriptions</text>
  <text x="796" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522" text-anchor="end">$312</text>
  <rect x="164" y="364" width="632" height="5" rx="2.5" fill="#F0EDEA"/>
  <rect class="exp-bar exp-4" x="164" y="364" width="102" height="5" rx="2.5" fill="#E86A33" fill-opacity="0.35"/>

  <!-- Shopping -->
  <text x="164" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522">Shopping</text>
  <text x="796" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2A2522" text-anchor="end">$280</text>
  <rect x="164" y="416" width="632" height="5" rx="2.5" fill="#F0EDEA"/>
  <rect class="exp-bar exp-5" x="164" y="416" width="92" height="5" rx="2.5" fill="#E86A33" fill-opacity="0.25"/>

  <!-- Other -->
  <text x="164" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6E6560">+ 4 more categories</text>
  <text x="796" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6E6560" text-anchor="end">$700</text>
</svg>
