<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9D78" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#43D9A2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#196EDD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#81C4FF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
