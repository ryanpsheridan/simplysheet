<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E63" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F06292" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#AD1457" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F48FB1" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7E57C2" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Abstract gradient background -->
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="240" cy="120" rx="280" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="730" cy="80" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="490" cy="30" rx="200" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="140" cy="310" r="130" fill="#E91E63" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="850" cy="60" r="110" fill="#7E57C2" fill-opacity="0.08" filter="url(#blur3)"/>

  <!-- Grain texture overlay -->
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Header -->
  <text x="164" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">Shared monthly budget</text>

  <!-- Income section -->
  <text x="164" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8A817C">COMBINED INCOME</text>
  <line x1="164" y1="158" x2="796" y2="158" stroke="#F0EDEA" stroke-width="1"/>

  <text x="164" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Partner A — Salary</text>
  <text x="740" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$3,200</text>

  <text x="164" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Partner B — Salary</text>
  <text x="740" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$2,800</text>

  <line x1="164" y1="232" x2="796" y2="232" stroke="#F0EDEA" stroke-width="1"/>
  <text x="164" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522">Total</text>
  <text x="740" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2A2522" text-anchor="end">$6,000</text>

  <!-- Shared expenses section -->
  <text x="164" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8A817C">SHARED EXPENSES</text>
  <line x1="164" y1="306" x2="796" y2="306" stroke="#F0EDEA" stroke-width="1"/>

  <text x="164" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Rent</text>
  <text x="740" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$1,800</text>

  <text x="164" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Groceries</text>
  <text x="740" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$650</text>

  <text x="164" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Utilities &amp; internet</text>
  <text x="740" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$280</text>

  <text x="164" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Car insurance</text>
  <rect x="580" y="410" width="72" height="20" rx="10" fill="#FCE4EC"/>
  <text x="616" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E91E63" text-anchor="middle">Due soon</text>
  <text x="740" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$190</text>

  <!-- Summary -->
  <line x1="164" y1="448" x2="796" y2="448" stroke="#F0EDEA" stroke-width="1"/>
  <text x="164" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Remaining this month</text>
  <text x="164" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2A2522">$3,080</text>

  <!-- Status pill -->
  <rect x="380" y="494" width="100" height="26" rx="13" fill="#E8F5E9"/>
  <text x="430" y="512" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2E7D32" text-anchor="middle">On track</text>
</svg>
