<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="glass" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="240" cy="140" rx="300" ry="200" fill="#196EDD" fill-opacity="0.12" filter="url(#blur1)"/>
  <ellipse cx="720" cy="400" rx="260" ry="180" fill="#1565C0" fill-opacity="0.08" filter="url(#blur1)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.10"/>

  <!-- Glass overlay layer -->
  <rect x="120" y="30" width="720" height="480" rx="16" fill="white" fill-opacity="0.72" filter="url(#glass)"/>

  <!-- Card on top of glass -->
  <rect x="180" y="80" width="620" height="520" rx="14" fill="white" fill-opacity="0.92" filter="url(#shadow)"/>

  <!-- Header pill -->
  <rect x="216" y="116" width="96" height="28" rx="14" fill="#EEF4FF"/>
  <text x="264" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#196EDD" text-anchor="middle">50 / 30 / 20</text>

  <text x="216" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8C8C8C">Monthly take-home</text>
  <text x="216" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2A2522" letter-spacing="-0.5">$5,200</text>

  <line x1="216" y1="240" x2="764" y2="240" stroke="#F0F0F0" stroke-width="1"/>

  <!-- Needs -->
  <text x="216" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#2A2522">Needs</text>
  <text x="764" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="end">$2,600</text>
  <text x="764" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8C8C8C" text-anchor="end">50%</text>
  <rect x="216" y="306" width="548" height="6" rx="3" fill="#F0F0F0"/>
  <rect x="216" y="306" width="274" height="6" rx="3" fill="#196EDD"/>

  <!-- Wants -->
  <text x="216" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#2A2522">Wants</text>
  <text x="764" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="end">$1,560</text>
  <text x="764" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8C8C8C" text-anchor="end">30%</text>
  <rect x="216" y="378" width="548" height="6" rx="3" fill="#F0F0F0"/>
  <rect x="216" y="378" width="164" height="6" rx="3" fill="#64B5F6"/>

  <!-- Savings -->
  <text x="216" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#2A2522">Savings &amp; Debt</text>
  <text x="764" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="end">$1,040</text>
  <text x="764" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8C8C8C" text-anchor="end">20%</text>
  <rect x="216" y="450" width="548" height="6" rx="3" fill="#F0F0F0"/>
  <rect x="216" y="450" width="110" height="6" rx="3" fill="#1A237E"/>

  <!-- Status -->
  <rect x="216" y="480" width="140" height="32" rx="16" fill="#E8F5E9"/>
  <circle cx="236" cy="496" r="5" fill="#4CAF50"/>
  <text x="248" y="501" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#2E7D32">On track this month</text>
</svg>
