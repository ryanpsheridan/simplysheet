<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EDF2"/>
      <stop offset="100%" stop-color="#F5E6DC"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5D7B9A" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78909C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B0BEC5" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2C3E50" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#78909C" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="220" cy="160" rx="320" ry="240" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="740" cy="380" rx="300" ry="220" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="40" rx="240" ry="180" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="440" r="150" fill="#2C3E50" fill-opacity="0.05" filter="url(#blur2)"/>
  <circle cx="860" cy="80" r="130" fill="#78909C" fill-opacity="0.06" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Header -->
  <text x="164" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#2A2522">Debt payoff comparison</text>

  <line x1="164" y1="154" x2="796" y2="154" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Avalanche -->
  <rect x="164" y="182" width="16" height="16" rx="4" fill="#2C3E50"/>
  <text x="192" y="197" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#2A2522">Avalanche</text>
  <!-- Skeleton detail -->
  <rect x="660" y="188" width="136" height="10" rx="5" fill="#E0E0E0"/>

  <!-- Snowball -->
  <rect x="164" y="226" width="16" height="16" rx="4" fill="#90A4AE"/>
  <text x="192" y="241" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#2A2522">Snowball</text>
  <!-- Skeleton detail -->
  <rect x="660" y="232" width="136" height="10" rx="5" fill="#E0E0E0"/>

  <line x1="164" y1="272" x2="796" y2="272" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Savings callout -->
  <rect x="164" y="296" width="120" height="10" rx="5" fill="#E0E0E0"/>
  <text x="164" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2C3E50">$287</text>
  <rect x="296" y="340" width="100" height="28" rx="14" fill="#E8EDF2"/>
  <text x="346" y="359" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="middle">in interest</text>

  <!-- Bar comparison -->
  <rect x="164" y="400" width="420" height="10" rx="5" fill="#2C3E50" opacity="0.85"/>
  <rect x="164" y="424" width="480" height="10" rx="5" fill="#90A4AE" opacity="0.7"/>

  <!-- Skeleton legend -->
  <rect x="164" y="460" width="80" height="8" rx="4" fill="#F0EDEA"/>
  <rect x="620" y="460" width="176" height="8" rx="4" fill="#F0EDEA"/>
</svg>
