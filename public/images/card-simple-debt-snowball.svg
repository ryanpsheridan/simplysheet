<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EDF2"/>
      <stop offset="100%" stop-color="#F5E6DC"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5D7B9A" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78909C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B0BEC5" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2C3E50" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#78909C" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="120" y="68" width="720" height="490" rx="10"/>
    </clipPath>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="220" cy="160" rx="320" ry="240" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="740" cy="380" rx="300" ry="220" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="40" rx="240" ry="180" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="440" r="150" fill="#2C3E50" fill-opacity="0.05" filter="url(#blur2)"/>
  <circle cx="860" cy="80" r="130" fill="#78909C" fill-opacity="0.06" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <g clip-path="url(#card-clip)">
    <!-- Stacked horizontal bars descending in size — like debts being knocked out -->
    <rect x="164" y="120" width="580" height="32" rx="16" fill="#2C3E50" opacity="0.12"/>
    <rect x="164" y="168" width="480" height="32" rx="16" fill="#2C3E50" opacity="0.2"/>
    <rect x="164" y="216" width="380" height="32" rx="16" fill="#2C3E50" opacity="0.35"/>
    <rect x="164" y="264" width="280" height="32" rx="16" fill="#2C3E50" opacity="0.5"/>
    <rect x="164" y="312" width="180" height="32" rx="16" fill="#2C3E50" opacity="0.7"/>
    <rect x="164" y="360" width="90" height="32" rx="16" fill="#2C3E50" opacity="0.9"/>
  </g>
</svg>
