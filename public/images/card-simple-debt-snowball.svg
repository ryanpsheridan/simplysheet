<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EDF2"/>
      <stop offset="100%" stop-color="#F5E6DC"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5D7B9A" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D35400" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F0A060" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2C3E50" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D35400" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="220" cy="160" rx="320" ry="240" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="740" cy="380" rx="300" ry="220" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="480" cy="40" rx="240" ry="180" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="120" cy="440" r="150" fill="#2C3E50" fill-opacity="0.05" filter="url(#blur2)"/>
  <circle cx="860" cy="80" r="130" fill="#D35400" fill-opacity="0.06" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Header -->
  <text x="164" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">Debt payoff comparison</text>

  <line x1="164" y1="140" x2="796" y2="140" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Avalanche -->
  <rect x="164" y="160" width="12" height="12" rx="3" fill="#2C3E50"/>
  <text x="186" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Avalanche</text>
  <text x="796" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560" text-anchor="end">$1,847 interest · 28 mo</text>

  <!-- Snowball -->
  <rect x="164" y="196" width="12" height="12" rx="3" fill="#D35400"/>
  <text x="186" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Snowball</text>
  <text x="796" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560" text-anchor="end">$2,134 interest · 28 mo</text>

  <line x1="164" y1="232" x2="796" y2="232" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Savings callout -->
  <text x="164" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6E6560">Avalanche saves</text>
  <text x="164" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2C3E50">$287</text>
  <rect x="268" y="284" width="88" height="24" rx="12" fill="#E8EDF2"/>
  <text x="312" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2C3E50" text-anchor="middle">in interest</text>

  <!-- Bar comparison -->
  <rect x="164" y="330" width="420" height="8" rx="4" fill="#2C3E50" opacity="0.85"/>
  <rect x="164" y="348" width="480" height="8" rx="4" fill="#D35400" opacity="0.85"/>
</svg>
