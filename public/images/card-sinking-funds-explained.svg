<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FECDD3"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11D48" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FB7185" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BE123C" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FDA4AF" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FECACA" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="260" cy="110" rx="310" ry="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="80" rx="270" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="30" rx="230" ry="140" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="110" cy="320" r="130" fill="#E11D48" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="870" cy="60" r="120" fill="#F43F5E" fill-opacity="0.08" filter="url(#blur3)"/>

  <!-- Grain texture overlay -->
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <!-- White card -->
  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <!-- Header -->
  <text x="164" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">Sinking fund tracker</text>
  <text x="796" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8A817C" text-anchor="end">4 active funds · $600 / month</text>

  <!-- Divider -->
  <line x1="164" y1="124" x2="796" y2="124" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Fund 1: Christmas gifts -->
  <text x="164" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#2A2522">Christmas gifts</text>
  <text x="796" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E11D48" text-anchor="end" font-weight="500">$50 / mo</text>
  <rect x="164" y="162" width="632" height="7" rx="3.5" fill="#F0EDEA"/>
  <rect x="164" y="162" width="506" height="7" rx="3.5" fill="#E11D48"/>
  <text x="164" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C">$480 of $600</text>
  <text x="796" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C" text-anchor="end">80%</text>

  <!-- Divider -->
  <line x1="164" y1="198" x2="796" y2="198" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Fund 2: Vacation -->
  <text x="164" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#2A2522">Vacation</text>
  <text x="796" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E11D48" text-anchor="end" font-weight="500">$250 / mo</text>
  <rect x="164" y="236" width="632" height="7" rx="3.5" fill="#F0EDEA"/>
  <rect x="164" y="236" width="237" height="7" rx="3.5" fill="#E11D48"/>
  <text x="164" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C">$750 of $2,000</text>
  <text x="796" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C" text-anchor="end">38%</text>

  <!-- Divider -->
  <line x1="164" y1="272" x2="796" y2="272" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Fund 3: Car insurance -->
  <text x="164" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#2A2522">Car insurance</text>
  <text x="796" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E11D48" text-anchor="end" font-weight="500">$100 / mo</text>
  <rect x="164" y="310" width="632" height="7" rx="3.5" fill="#F0EDEA"/>
  <rect x="164" y="310" width="474" height="7" rx="3.5" fill="#E11D48"/>
  <text x="164" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C">$900 of $1,200</text>
  <text x="796" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C" text-anchor="end">75%</text>

  <!-- Divider -->
  <line x1="164" y1="346" x2="796" y2="346" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Fund 4: Home repairs -->
  <text x="164" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#2A2522">Home repairs</text>
  <text x="796" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E11D48" text-anchor="end" font-weight="500">$200 / mo</text>
  <rect x="164" y="384" width="632" height="7" rx="3.5" fill="#F0EDEA"/>
  <rect x="164" y="384" width="158" height="7" rx="3.5" fill="#E11D48"/>
  <text x="164" y="406" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C">$200 of $800</text>
  <text x="796" y="406" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8A817C" text-anchor="end">25%</text>

  <!-- Divider -->
  <line x1="164" y1="422" x2="796" y2="422" stroke="#F0EDEA" stroke-width="1"/>

  <!-- Monthly total -->
  <text x="164" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8A817C">Total monthly contribution</text>
  <text x="796" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#2A2522" text-anchor="end">$600 / month</text>
</svg>
