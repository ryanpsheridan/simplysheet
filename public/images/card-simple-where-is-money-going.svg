<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E86A33" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFB74D" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BF360C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFCC80" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E86A33" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFB74D" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="120" y="68" width="720" height="490" rx="10"/>
    </clipPath>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="50%" stop-color="#FFE4C8"/>
      <stop offset="100%" stop-color="#FFDAB0"/>
    </linearGradient>
    <filter id="land-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="260" cy="140" rx="280" ry="200" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="720" cy="380" rx="260" ry="180" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="50" rx="200" ry="150" fill="url(#blob3)" filter="url(#blur3)"/>
  <circle cx="140" cy="420" r="140" fill="#E86A33" fill-opacity="0.06" filter="url(#blur2)"/>
  <circle cx="840" cy="100" r="120" fill="#BF360C" fill-opacity="0.07" filter="url(#blur3)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.12"/>

  <rect x="120" y="68" width="720" height="490" rx="10" fill="white"/>

  <g clip-path="url(#card-clip)">
    <!-- Desert dunes — warm, undulating sand forms -->
    <rect x="120" y="68" width="720" height="490" fill="url(#sky)"/>

    <!-- Sun glow near horizon -->
    <circle cx="600" cy="220" r="80" fill="#FFB74D" opacity="0.2" filter="url(#land-blur)"/>

    <!-- Distant dune ridges -->
    <ellipse cx="300" cy="320" rx="450" ry="60" fill="#E86A33" opacity="0.1" filter="url(#land-blur)"/>
    <ellipse cx="650" cy="340" rx="380" ry="50" fill="#BF360C" opacity="0.08" filter="url(#land-blur)"/>

    <!-- Mid dunes -->
    <ellipse cx="500" cy="400" rx="500" ry="80" fill="#E86A33" opacity="0.18" filter="url(#land-blur)"/>
    <ellipse cx="250" cy="420" rx="350" ry="70" fill="#D4571E" opacity="0.15" filter="url(#land-blur)"/>

    <!-- Foreground dunes -->
    <ellipse cx="400" cy="500" rx="480" ry="100" fill="#E86A33" opacity="0.3" filter="url(#land-blur)"/>
    <ellipse cx="700" cy="520" rx="300" ry="90" fill="#BF360C" opacity="0.22" filter="url(#land-blur)"/>
    <ellipse cx="180" cy="540" rx="280" ry="80" fill="#E86A33" opacity="0.25" filter="url(#land-blur)"/>
  </g>
</svg>
