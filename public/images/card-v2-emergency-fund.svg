<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C6BC0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7986CB" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="blob2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3949AB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9FA8DA" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="500" cy="300" rx="320" ry="240" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="200" cy="100" rx="260" ry="160" fill="url(#blob2)" filter="url(#blur2)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.1"/>

  <!-- Concentric circles — protection/safety — offset from center -->
  <g transform="translate(420, 260)">
    <circle cx="0" cy="0" r="220" fill="none" stroke="#5C6BC0" stroke-width="1.5" opacity="0.1"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#5C6BC0" stroke-width="1.5" opacity="0.18"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#5C6BC0" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="48" fill="#5C6BC0" opacity="0.6"/>
    <circle cx="0" cy="0" r="16" fill="white" opacity="0.9"/>
  </g>

  <!-- Small accent — floating arc cropped by canvas -->
  <circle cx="880" cy="80" r="120" fill="none" stroke="#3949AB" stroke-width="2" opacity="0.15"/>
</svg>
