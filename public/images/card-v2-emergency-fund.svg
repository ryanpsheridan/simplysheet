<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <ellipse cx="800" cy="100" rx="300" ry="200" fill="#5C6BC0" fill-opacity="0.12" filter="url(#blur1)"/>
  <ellipse cx="150" cy="400" rx="260" ry="180" fill="#3949AB" fill-opacity="0.10" filter="url(#blur1)"/>
  <rect width="960" height="540" filter="url(#grain)" opacity="0.10"/>

  <!-- Top card - savings gauge -->
  <rect x="80" y="40" width="520" height="200" rx="16" fill="white" filter="url(#shadow)"/>

  <text x="112" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8C8C8C">Emergency fund goal</text>
  <text x="112" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2A2522" letter-spacing="-0.5">$16,800</text>

  <!-- Circular progress -->
  <circle cx="520" cy="120" r="52" fill="none" stroke="#F0F0F0" stroke-width="10"/>
  <circle cx="520" cy="120" r="52" fill="none" stroke="#5C6BC0" stroke-width="10" stroke-dasharray="184 143" stroke-linecap="round" transform="rotate(-90 520 120)"/>
  <text x="520" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#2A2522" text-anchor="middle">56%</text>
  <text x="520" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C" text-anchor="middle">funded</text>

  <!-- Monthly savings chip -->
  <rect x="112" y="148" width="180" height="32" rx="8" fill="#F5F5F5"/>
  <text x="124" y="169" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6B6B">Saving $400/mo · 18 mo left</text>

  <!-- Right card - month breakdown -->
  <rect x="460" y="180" width="440" height="320" rx="16" fill="white" filter="url(#shadow)"/>

  <text x="492" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522">Monthly essentials</text>
  <text x="868" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2A2522" text-anchor="end">$2,800</text>

  <line x1="492" y1="232" x2="868" y2="232" stroke="#F0F0F0" stroke-width="1"/>

  <!-- Expense rows with colored dots -->
  <circle cx="504" cy="262" r="5" fill="#5C6BC0"/>
  <text x="520" y="267" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Housing</text>
  <text x="868" y="267" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$1,200</text>

  <circle cx="504" cy="298" r="5" fill="#7986CB"/>
  <text x="520" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Groceries</text>
  <text x="868" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$520</text>

  <circle cx="504" cy="334" r="5" fill="#9FA8DA"/>
  <text x="520" y="339" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Insurance</text>
  <text x="868" y="339" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$380</text>

  <circle cx="504" cy="370" r="5" fill="#C5CAE9"/>
  <text x="520" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522">Transportation</text>
  <text x="868" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2A2522" text-anchor="end">$340</text>

  <circle cx="504" cy="406" r="5" fill="#E8EAF6"/>
  <text x="520" y="411" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6B6B6B">Utilities + other</text>
  <text x="868" y="411" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6B6B6B" text-anchor="end">$360</text>

  <!-- Multiplier chip -->
  <rect x="492" y="440" width="200" height="36" rx="18" fill="#EDE7F6"/>
  <text x="510" y="463" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#5C6BC0">× 6 months = $16,800</text>

  <!-- Bottom-left floating stat card -->
  <rect x="80" y="300" width="240" height="140" rx="16" fill="white" filter="url(#shadow)"/>
  <text x="112" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8C8C8C">Current savings</text>
  <text x="112" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#5C6BC0" letter-spacing="-0.5">$9,400</text>
  <rect x="112" y="396" width="176" height="6" rx="3" fill="#F0F0F0"/>
  <rect x="112" y="396" width="99" height="6" rx="3" fill="#5C6BC0"/>
  <text x="112" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8C8C8C">$7,400 remaining</text>
</svg>
